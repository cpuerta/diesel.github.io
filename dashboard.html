<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Inversiones C&M</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --secondary: #f97316; }
        body { font-family: sans-serif; margin: 0; background: #f1f5f9; }
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-around; }
        .view { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showView('pos')">VENDER (POS)</button>
    <button onclick="showView('admin')">INVENTARIO</button>
</nav>

<div id="pos" class="view active">
    <div class="card">
        <h2>Punto de Venta (POS)</h2>
        <input type="text" id="v_cliente" placeholder="Nombre del Cliente">
        <input type="text" id="v_codigo" placeholder="Código del Repuesto">
        <input type="number" id="v_cant" placeholder="Cantidad">
        <input type="number" id="v_total" placeholder="Total $">
        <button onclick="procesarVenta()">REGISTRAR Y DESCARGAR RECIBO</button>
    </div>
</div>

<div id="admin" class="view">
    <div class="card">
        <h2>Cargar Nuevo Producto</h2>
        <input type="text" id="p_codigo" placeholder="Código">
        <input type="text" id="p_desc" placeholder="Descripción">
        <input type="text" id="p_app" placeholder="Aplicación (Motor)">
        <input type="number" id="p_stock" placeholder="Stock Inicial">
        <input type="number" id="p_precio" placeholder="Precio $">
        <button onclick="cargarInventario()">GUARDAR EN GOOGLE SHEETS</button>
    </div>
</div>

<script>
   <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHgvjxVJBLR69zv5idP-FPWvYKgXfC1XtlYumwymrnol1bE6Pn7xh65XOsCi6ufQ-6Tw/exec'; // <--- REVISA QUE SEA LA NUEVA

    function enviarDatos(datos) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", WEB_APP_URL, true);
        xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4 && xhr.status == 200) {
                alert("✅ Operación Exitosa en Google Sheets");
                // Limpiar campos si es necesario
            }
        };

        xhr.send(JSON.stringify(datos));
    }

    function cargarInventario() {
        const payload = {
            action: 'agregarProducto',
            codigo: document.getElementById('p_codigo').value,
            categoria: 'Repuesto',
            desc: document.getElementById('p_desc').value,
            aplicacion: document.getElementById('p_app').value,
            stock: document.getElementById('p_stock').value,
            precio: document.getElementById('p_precio').value
        };
        
        if(!payload.codigo) return alert("Escribe un código");
        enviarDatos(payload);
    }

    function procesarVenta() {
        const payload = {
            action: 'registrarVenta',
            cliente: document.getElementById('v_cliente').value,
            codigo: document.getElementById('v_codigo').value,
            cantidad: document.getElementById('v_cant').value,
            total: document.getElementById('v_total').value
        };
        
        if(!payload.codigo) return alert("Escribe un código");
        enviarDatos(payload);
    }

    
    
</script>

</body>
</html>
