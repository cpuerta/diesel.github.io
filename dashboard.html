<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones C&M C.A. | Gestión Diésel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --secondary: #f97316; --accent: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; color: var(--primary); }
        
        nav { background: var(--primary); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-links button { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; cursor: pointer; border-radius: 5px; margin-left: 10px; transition: 0.3s; }
        .nav-links button:hover { background: var(--secondary); border-color: var(--secondary); }

        .container { padding: 30px 5%; max-width: 900px; margin: auto; }
        .view { display: none; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--secondary); }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button.main-btn { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button.main-btn:hover { background: #ea580c; transform: translateY(-2px); }
        
        .status { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.4rem; font-weight: 800;">C&M <span style="color:var(--secondary)">INVERSIONES</span></div>
    <div class="nav-links">
        <button onclick="showView('pos_view')"><i class="fas fa-cash-register"></i> POS</button>
        <button onclick="showView('admin_view')"><i class="fas fa-boxes"></i> STOCK</button>
    </div>
</nav>

<div class="container">
    <div id="pos_view" class="view active">
        <div class="card">
            <h2><i class="fas fa-shopping-cart"></i> Punto de Venta (POS)</h2>
            <input type="text" id="v_cliente" placeholder="Nombre del Cliente / Taller">
            <input type="text" id="v_codigo" placeholder="Código de Pieza (Ej: DLLA150P...)">
            <input type="number" id="v_cant" placeholder="Cantidad Vendida">
            <input type="number" id="v_total" placeholder="Total a Cobrar ($)">
            <button class="main-btn" onclick="ejecutarVenta()">PROCESAR VENTA Y RECIBO</button>
            <div id="pos_status" class="status"></div>
        </div>
    </div>

    <div id="admin_view" class="view">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Cargar Inventario</h2>
            <input type="text" id="p_codigo" placeholder="Código OEM">
            <input type="text" id="p_desc" placeholder="Descripción (Ej: Tobera Tipo P)">
            <input type="text" id="p_app" placeholder="Aplicación de Motor (Ej: Hilux 2KD)">
            <input type="number" id="p_stock" placeholder="Stock Inicial">
            <input type="number" id="p_precio" placeholder="Precio Sugerido $">
            <button class="main-btn" onclick="ejecutarCarga()" style="background: var(--primary);">GUARDAR EN LA NUBE</button>
            <div id="admin_status" class="status"></div>
        </div>
    </div>
</div>

<script>
    // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzzsyW7jBG9DymFSP4SPJNvfjtCxtXobH5Db0ah7CoyFtM2BX7eXSizJJIm_v4OQSjyvg/exec'; 

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function llamarServidor(datos, statusId) {
        const statusDiv = document.getElementById(statusId);
        statusDiv.style.display = "block";
        statusDiv.style.background = "#e2e8f0";
        statusDiv.innerText = "Conectando con Google Sheets...";

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            
            statusDiv.style.background = "#dcfce7";
            statusDiv.style.color = "#166534";
            statusDiv.innerText = "✅ Operación Exitosa";
            setTimeout(() => statusDiv.style.display = "none", 3000);
            return true;
        } catch (e) {
            statusDiv.style.background = "#fee2e2";
            statusDiv.innerText = "❌ Error de conexión";
            return false;
        }
    }

    async function ejecutarVenta() {
        const datos = {
            action: 'registrarVenta',
            cliente: document.getElementById('v_cliente').value,
            codigo: document.getElementById('v_codigo').value,
            cantidad: document.getElementById('v_cant').value,
            total: document.getElementById('v_total').value
        };

        if(!datos.codigo || !datos.cliente) return alert("Complete los datos");
        
        const ok = await llamarServidor(datos, 'pos_status');
        if(ok) {
            generarPDF(datos);
            document.getElementById('v_codigo').value = "";
            document.getElementById('v_cant').value = "";
        }
    }

    async function ejecutarCarga() {
        const datos = {
            action: 'agregarProducto',
            codigo: document.getElementById('p_codigo').value,
            desc: document.getElementById('p_desc').value,
            aplicacion: document.getElementById('p_app').value,
            stock: document.getElementById('p_stock').value,
            precio: document.getElementById('p_precio').value,
            categoria: 'Diesel'
        };

        if(!datos.codigo) return alert("El código es obligatorio");
        
        const ok = await llamarServidor(datos, 'admin_status');
        if(ok) {
            document.getElementById('p_codigo').value = "";
            document.getElementById('p_stock').value = "";
        }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("Inversiones C&M C.A.", 20, 20);
        doc.setFontSize(10);
        doc.text("RIF: J-50478231-0 | Ciudad Bolívar", 20, 28);
        doc.line(20, 35, 190, 35);
        doc.text(`CLIENTE: ${d.cliente}`, 20, 45);
        doc.text(`PIEZA: ${d.codigo}`, 20, 55);
        doc.text(`CANTIDAD: ${d.cantidad}`, 20, 65);
        doc.setFontSize(14);
        doc.text(`TOTAL PAGADO: $${d.total}`, 20, 80);
        doc.save(`Recibo_CM_${d.cliente}.pdf`);
    }
</script>

</body>
</html>
