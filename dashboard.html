<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones C&M C.A. | Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --secondary: #f97316; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; }
        nav { background: var(--primary); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .menu button { background: none; border: 1px solid white; color: white; padding: 8px 15px; cursor: pointer; border-radius: 5px; margin-left: 10px; }
        .container { padding: 30px 5%; max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: none; }
        .active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .loader { display: none; text-align: center; color: var(--secondary); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; font-size: 1.2rem;">C&M INVERSIONES</div>
    <div class="menu">
        <button onclick="switchTab('tab-pos')">VENTAS</button>
        <button onclick="switchTab('tab-inv')">STOCK</button>
    </div>
</nav>

<div class="container">
    <div id="tab-pos" class="card active">
        <h2>Punto de Venta</h2>
        <input type="text" id="v-cliente" placeholder="Nombre del Cliente">
        <input type="text" id="v-codigo" placeholder="Código de Repuesto">
        <input type="number" id="v-cant" placeholder="Cantidad">
        <input type="number" id="v-total" placeholder="Monto Total $">
        <button class="btn-main" onclick="registrarVenta()">PROCESAR Y RECIBO</button>
        <div id="load-pos" class="loader">Procesando en la nube...</div>
    </div>

    <div id="tab-inv" class="card">
        <h2>Cargar Nuevo Repuesto</h2>
        <input type="text" id="i-codigo" placeholder="Código OEM">
        <input type="text" id="i-desc" placeholder="Descripción">
        <input type="text" id="i-app" placeholder="Aplicación Motor">
        <input type="number" id="i-stock" placeholder="Stock Inicial">
        <input type="number" id="i-precio" placeholder="Precio $">
        <button class="btn-main" style="background: var(--primary);" onclick="cargarStock()">GUARDAR PRODUCTO</button>
        <div id="load-inv" class="loader">Sincronizando con Google...</div>
    </div>
</div>

<script>
    // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT (LA QUE TERMINA EN /exec)
    const API_URL = 'https://script.google.com/macros/s/AKfycbxqmGNjJFao0W9uhjCi6bbBWfVGh_DbeBK6rrb2YkKsONMf59hYyGbuya122mYKKMneZQ/exec
';

    function switchTab(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

   async function conectar(datos, loaderId) {
    const loader = document.getElementById(loaderId);
    loader.style.display = "block";

    try {
        // Usamos una técnica de envío crudo para evitar bloqueos
        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'text/plain' // Fundamental para Apps Script
            },
            body: JSON.stringify(datos)
        });
        
        loader.innerText = "✅ ¡Enviado! Verifica tu Excel.";
        setTimeout(() => { loader.style.display = "none"; }, 4000);
        return true;
    } catch (e) {
        alert("Error físico de conexión: " + e.message);
        loader.style.display = "none";
        return false;
    }
}
    async function cargarStock() {
        const payload = {
            action: 'agregar',
            codigo: document.getElementById('i-codigo').value,
            categoria: 'Diesel',
            desc: document.getElementById('i-desc').value,
            aplicacion: document.getElementById('i-app').value,
            stock: document.getElementById('i-stock').value,
            precio: document.getElementById('i-precio').value
        };
        if(!payload.codigo) return alert("Falta el código");
        const ok = await conectar(payload, 'load-inv');
        if(ok) document.getElementById('i-codigo').value = "";
    }

    async function registrarVenta() {
        const payload = {
            action: 'venta',
            cliente: document.getElementById('v-cliente').value,
            codigo: document.getElementById('v-codigo').value,
            cant: document.getElementById('v-cant').value,
            total: document.getElementById('v-total').value
        };
        if(!payload.codigo || !payload.cliente) return alert("Faltan datos");
        
        const ok = await conectar(payload, 'load-pos');
        if(ok) {
            generarPDF(payload);
            document.getElementById('v-codigo').value = "";
        }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("Inversiones C&M C.A.", 20, 20);
        doc.setFontSize(10);
        doc.text(`Recibo para: ${d.cliente}`, 20, 40);
        doc.text(`Código: ${d.codigo}`, 20, 50);
        doc.text(`Total: $${d.total}`, 20, 60);
        doc.save(`Recibo_CM_${d.cliente}.pdf`);
    }
</script>

</body>
</html>
