<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Search | Catálogo Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-6">

    <div class="relative group">
    <input 
        type="text" id="partSearch" 
        placeholder="Marca, Aplicación o Nro de Parte..." 
        class="w-full p-6 pr-16 rounded-[2rem] border-none shadow-2xl focus:ring-4 focus:ring-blue-100 text-xl outline-none transition-all bg-white text-slate-700"
        autofocus autocomplete="off"
    >
    <button id="clearBtn" class="hidden absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </button>
</div>

<div id="resultsArea" class="mt-8"></div>

<script>
    const WHATSAPP_PHONE = '584120000000'; 
    const input = document.getElementById('partSearch');
    const clearBtn = document.getElementById('clearBtn');
    const resultsArea = document.getElementById('resultsArea');

    // Mostrar/Ocultar botón de limpiar
    input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', input.value.length === 0);
    });

    // Acción de limpiar
    clearBtn.addEventListener('click', () => {
        input.value = '';
        resultsArea.innerHTML = '';
        clearBtn.classList.add('hidden');
        input.focus();
    });

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const query = input.value.trim().toUpperCase();
            if (!query) return;

            try {
                const response = await fetch('db.json');
                const data = await response.json();

                const matches = data.filter(i => 
                    i.m.toUpperCase().includes(query) || 
                    i.a.toUpperCase().includes(query) || 
                    i.p.toUpperCase().includes(query) || 
                    i.r.toUpperCase().includes(query)
                );

                renderResults(matches, query);
            } catch (error) {
                resultsArea.innerHTML = '<p class="text-red-400 text-center">Error al cargar datos.</p>';
            }
        }
    });

    function renderResults(matches, query) {
        resultsArea.innerHTML = '';
        if (matches.length > 0) {
            const countText = document.createElement('p');
            countText.className = 'text-slate-400 text-[10px] mb-4 ml-4 uppercase tracking-[0.2em] font-black';
            countText.innerText = `${matches.length} Resultado(s) para "${query}"`;
            resultsArea.appendChild(countText);

            matches.forEach(item => {
                const msg = encodeURIComponent(`Hola, me interesa este repuesto:\nMotor: ${item.m}\nNro Parte: ${item.p}\nAplicación: ${item.a}`);
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-[2rem] shadow-xl border border-white mb-6 fade-in';
                card.innerHTML = `
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase tracking-tighter">${item.m}</span>
                                <p class="text-xl font-bold text-slate-800 leading-tight mt-1">${item.a}</p>
                            </div>
                            <div class="flex items-center gap-1 text-green-600">
                                <span class="relative flex h-2 w-2">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                </span>
                                <span class="text-[9px] font-bold uppercase">Stock</span>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Identificación técnica</span>
                            <p class="text-xl font-mono text-slate-800 font-bold break-all">${item.p}</p>
                            <p class="text-[10px] text-slate-400 mt-0.5">Ref: ${item.r}</p>
                        </div>
                        <a href="https://wa.me/${WHATSAPP_PHONE}?text=${msg}" target="_blank"
                           class="w-full bg-slate-900 hover:bg-black text-white text-center py-4 rounded-2xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                            Consultar vía WhatsApp
                        </a>
                    </div>`;
                resultsArea.appendChild(card);
            });
        } else {
            resultsArea.innerHTML = `<div class="text-center p-10 bg-white/50 rounded-3xl border border-dashed border-slate-200 fade-in">
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Sin coincidencias para "${query}"</p>
                <a href="https://wa.me/${WHATSAPP_PHONE}?text=Hola, busco: ${query}" class="inline-block mt-4 text-blue-600 font-bold text-xs border-b-2 border-blue-100">HABLAR CON UN ASESOR</a>
            </div>`;
        }
    }
</script>
</body>
</html>
