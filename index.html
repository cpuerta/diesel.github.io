<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Parts Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; }
        .search-focus:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl px-6">
        <div class="relative">
            <input 
                type="text" 
                id="partSearch" 
                placeholder="Introduce número de parte..." 
                class="w-full p-5 text-xl rounded-2xl border border-gray-200 shadow-sm search-focus transition-all duration-300 text-gray-700"
                autocomplete="off"
                autofocus
            >
            <div id="loader" class="hidden absolute right-5 top-5">
                <svg class="animate-spin h-6 w-6 text-blue-500" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
            </div>
        </div>

        <div id="resultsArea" class="mt-8 space-y-4 opacity-0 transition-opacity duration-500">
            </div>
    </div>

    <script>
        // Simulación de base de datos basada en tus datos
        const db = [
            { motor: "ISUZU", aplicacion: "4BD1/6BD1 C/T", nro: "DLLA154S334N419", ref: "105015-4190" },
            { motor: "ISUZU", aplicacion: "4JB1 C/T", nro: "DLLA145PN238", ref: "9432612582" },
            { motor: "ISUZU", aplicacion: "6HH1", nro: "DLLA156SM058", ref: "105025-0580 9432610644" },
            { motor: "CUMMINS", aplicacion: "4BT/6BT", nro: "DSLA145P265", ref: "0433175033" },
            { motor: "IVECO", aplicacion: "5912/6012", nro: "DSLA134P604", ref: "0433175114" },
            { motor: "MERCEDES", aplicacion: "710/711/1720/364/366", nro: "DLLA134P422", ref: "0433171303" }
        ];

        const input = document.getElementById('partSearch');
        const resultsArea = document.getElementById('resultsArea');
        const loader = document.getElementById('loader');

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = input.value.trim().toUpperCase();
                searchPart(query);
            }
        });

        async function searchPart(query) {
    if (!query) return;

    loader.classList.remove('hidden');
    resultsArea.classList.add('opacity-0');

    try {
        // Cambia 'buscar.php' por la URL donde subas el archivo PHP
        const response = await fetch(`buscar.php?q=${query}`);
        const data = await response.json();

        loader.classList.add('hidden');
        
        if (data.error) {
            resultsArea.innerHTML = `<p class="text-center text-gray-400">${data.error}</p>`;
        } else {
            displayResult(data);
        }
    } catch (error) {
        loader.classList.add('hidden');
        resultsArea.innerHTML = `<p class="text-center text-red-400">Error de conexión al servidor.</p>`;
    }
    resultsArea.classList.remove('opacity-0');
}
        function displayResult(item) {
            resultsArea.innerHTML = '';
            if (item) {
                resultsArea.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow-lg border border-blue-50">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <p class="text-xs font-bold text-blue-500 uppercase tracking-widest">Motor</p>
                                <p class="text-2xl font-semibold text-gray-800">${item.motor}</p>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-blue-500 uppercase tracking-widest">Aplicación</p>
                                <p class="text-lg text-gray-600">${item.aplicacion}</p>
                            </div>
                            <div class="col-span-2 border-t pt-4">
                                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Detalles de Parte</p>
                                <p class="text-xl font-mono text-gray-800 mt-1">${item.nro}</p>
                                <p class="text-sm text-gray-500 mt-1">Ref: ${item.ref}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                resultsArea.innerHTML = `<p class="text-center text-gray-400">No se encontraron coincidencias.</p>`;
            }
            resultsArea.classList.remove('opacity-0');
        }
    </script>
</body>
</html>
