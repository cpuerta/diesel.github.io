<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Search | Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="supabase.js"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xl text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-8">Diesel Parts Cloud</h1>

        <div class="relative">
            <input 
                type="text" id="partSearch" 
                placeholder="Número de parte + Enter..." 
                class="w-full p-5 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-blue-500 text-lg outline-none"
                autofocus
            >
            <div id="loader" class="hidden absolute right-5 top-5">
                <div class="animate-spin h-6 w-6 border-4 border-blue-500 border-t-transparent rounded-full"></div>
            </div>
        </div>

        <div id="resultsArea" class="mt-10 text-left"></div>
    </div>

    <script>
        // 1. CONFIGURACIÓN (Reemplaza con tus datos de Supabase)
        const SUPABASE_URL = 'https://pcsybwizwbmsihloqgwe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjc3lid2l6d2Jtc2lobG9xZ3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODU5MjIsImV4cCI6MjA4ODY2MTkyMn0.Zduiwhmff4uSQecRjRZv714QrC0hF0mDqoW6ORqMvYc';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const input = document.getElementById('partSearch');
        const resultsArea = document.getElementById('resultsArea');
        const loader = document.getElementById('loader');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (!query) return;

                loader.classList.remove('hidden');
                resultsArea.innerHTML = '';

                // 2. BÚSQUEDA EN SUPABASE
                // Buscamos coincidencia parcial en nro_parte o referencias
                const { data, error } = await supabase
                    .from('repuestos')
                    .select('*')
                    .or(`nro_parte.ilike.%${query}%,referencias.ilike.%${query}%`)
                    .limit(1)
                    .single();

                loader.classList.add('hidden');

                if (error) {
                    resultsArea.innerHTML = '<p class="text-center text-slate-400">No se encontraron resultados.</p>';
                } else {
                    renderResult(data);
                }
            }
        });

        function renderResult(item) {
            resultsArea.innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 animate-fade-in">
                    <div class="grid gap-4">
                        <div class="border-b pb-2">
                            <span class="text-[10px] font-bold text-blue-500 uppercase">Motor</span>
                            <p class="text-xl font-semibold text-slate-800">${item.motor}</p>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-blue-500 uppercase">Aplicación</span>
                            <p class="text-slate-600">${item.aplicacion}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">Identificación</span>
                            <p class="text-lg font-mono text-blue-700">${item.nro_parte}</p>
                            <p class="text-xs text-slate-400 mt-1">${item.referencias}</p>
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
